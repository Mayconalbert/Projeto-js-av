<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Trabalhando com Eventos #01</title>
    <link rel='stylesheet' href='css/estilo.css'>
</head>

<body class="conteudo exercicio">
    <div>
         <!-- onclick="navegarEm5s(event) -->
        <a espera-um-pouco href="https://google.com.br"
       >Google</a>
    </div>
    <script>
       function navegarEm5s(e) {
        e.preventDefault()
        console.log('Saindo em 5s...')
        setTimeout(()=> {
            const linke = e.target
            window.location.href = linke.href
        }, 5000)

       }

       const a = document.querySelector('a')
       a.onclick = navegarEm5s

    //    const a = document.querySelector('[espera-um-poco]')
    //    a.onclik = navegarEm5s


    </script>
</body>
