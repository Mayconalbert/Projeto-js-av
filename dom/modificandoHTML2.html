<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Modificando HTML #02</title>
    <link rel='stylesheet' href='css/estilo.css'>
</head>

<body class='conteudo exercicio'>
    <div>
        <p>Texto Inicial</p>
    </div>
    <script>
       const div = document.querySelector('div')
       div.innerHTML = 'Texto Alterado'
    //    div.outerHTML = 'OPA'
        div.insertAdjacentHTML('beforebegin', '<p>Antes Inicio</p>')
        div.insertAdjacentHTML('afterbegin', '<p>Depois do inicio')
        div.insertAdjacentHTML('beforeend', '<p>Antes do fim')
        div.insertAdjacentHTML('afterend', '<p>Depois do fim')
        
        console.log(div.innerHTML)

    </script>
</body>

</html>
