<h1>Estudar Tags HTMl</h1>

<!--
section - agrupamento tematico de contéudo
article - contéudo auto-contido
herder - cobeçalho do documento
foorte - rodape do documento
nav - agrupa os links de navegasão
aside - de lado (ex. sidebar). relacionado com o contéudo em volta (adendo)
detalis - exibir detalhes que pode ser exibidos ou escondidos

As famosas ...

div - divisão ou seção
span - usando para agrupar elementos inline

-->

<div>Aria 1</div>
<div>Aria 2</div>

<p>
    esse e texto com <span class="diferente"> Muito diversáo</span> ponto.
</p>

<style>
    div {
        display: inline;
    }
    span {
        display: block;
    }
    .diferente {
        font-weight: bold;
        font-size: 30px;
        color: chocolate;

    }

</style>
