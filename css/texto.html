<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Texto</title>
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower" rel="stylesheet">
    <style>
        div {
            font-size:50px;
        }
      p {
        /*Valores padrão*/
        font-size: 1em;
        font-size: 16px;
        font-size: 100%;
        font-size: 12pt;

        /*Unidades absolutas*/
        font-size: 100px;
        font-size: 72pt;
        font-size: 1in;

        /*Unidades  relativas*/
        font-size: 2.2em; /* Pegarar o valor do pai */
        font-size: 2.2rem; /* pegarar o valor da raiz (html) */
        font-size: 50vw; /* largura da tela quem for maior tbm*/
        font-size: 10vh; /* altura da tela sempre vai sem o menor lado*/
        
        font-family: monospace;
        font-family: Georgia, serif;
    }

        * {
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>
    <div>
        <p>
            Que texto
            <br>legal!!!
        </p>
    </div>
    <a href="http://google.com" class="botao destaque">Google</a>
</body>

</html>
