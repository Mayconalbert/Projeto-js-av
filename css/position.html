<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Position</title>
    <style>
       div {
            font-size: 20px;
            padding: 30px;
            border: solid 5px #0439
            
       }
       .static {
           top: 100px;
           left: 100px;
           background-color: aqua;
       }
       .fixed {
            position: fixed;
            bottom: 20px;
            right: 0px;
            background-color: lightcoral;
       }
       .relative1 {
            position: relative;
            left: 50px;
            right: 0px;
            background-color: lightslategrey;    
       }
       .absolute1 {
            position: absolute;
            left: 350px;
            top: 100px;
            background-color: blue;
       }
       .relative2 {
            position: relative;
            left: 100px;
            top: 500px;
            width: 200px;
            height: 200px;
            background-color: mediumslateblue;
       }
       .absolute2 {
            position: absolute;
            left: 10px;
            top: 10px;
            width: 20px;
            height: 20px;
           background-color: chartreuse;
       }
       .sticky {
            position: -webkit-sticky;
            position: sticky;
            background-color: #777;
            top: 10px;

       }
    </style>
</head>

<body>
    <div class="static">Static (Padrão)</div>
    <div class="fixed">Fixed</div>
    <div class="relative1">Relative</div>
    <div class="absolute1">Absolute</div>

    <div class="relative2">
        <div class="absolute2"></div>
    </div>

    <div class="sticky">Sticky</div>
    <p style="padding-bottom: 2000px;">Opa</p>
</body>

</html>
