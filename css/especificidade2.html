<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Especificidade CSS</title>
    <style>
        /* https://specificity.keegan.st/ */

        /* Quem tem a ordem de especificidade maior */

        body {
            font-size: 40px;
        }
        div {
            background-color: aqua;
        }
        div[wm-cor] {
            background-color: rgb(129, 167, 173);
        }
        div.estilo {
            background-color: blueviolet;
        }
        #unico1, #unico2 {
            background-color: rgb(160, 139, 139);
        }
        div:hover, #unico1:hover{ background-color: blue;}

    </style>
</head>

<body>
    <div id="unico1" class="estilo">
        #unico1 vs .estilo vs inline
    </div>
    <div id="unico2" class="estilo">#unico2 vs .estilo</div>
    <div class="estilo" wm-cor>.estilo vs wm-cor</div>
    <div wm-cor>wm-cor</div>
    <div class="estilo">.estilo</div>
    <div>elemento</div>
</body>

</html>
