<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <style>
        body{
            font-size: 40px;
            color: wheat;
            background-color: cadetblue;
        }
        ul {padding: 0;}
        div {background-color: brown;}
        span {background-color: rebeccapurple}
        li{background-color:burlywood}
        div, span, li{
            width: 50%;
            width: 200px;
            height: 80px;
            padding-top:30px;
            margin-bottom: 10px;
            text-align: center;
            /* display: inline;
            display:block; */
            display: inline-block;
        }
    </style>
</head>

<body>
    <div>Texto 1</div>
    <span>Texto 2</span>
    <span>Texto 3</span>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</body>

</html>
